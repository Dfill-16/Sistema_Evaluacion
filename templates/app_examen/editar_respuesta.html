{% extends 'base.html' %}
{% load static %}

{% block title %}Editar Respuesta{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto animate-fade-in space-y-6">
    <div class="bg-gradient-to-r from-teal-600 to-blue-700 text-white rounded-2xl shadow-xl p-7 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
            <p class="text-sm uppercase tracking-widest text-blue-100 font-semibold">Edición de respuesta</p>
            <h1 class="text-3xl font-bold">Ajustar opción de respuesta</h1>
            <p class="text-blue-100 mt-1">Mantén una sola respuesta correcta para la pregunta.</p>
        </div>
        <a href="{% url 'app_examen:detalle_examen' respuesta.pregunta.examen.id %}" class="btn-secondary inline-flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            Volver
        </a>
    </div>

    <div class="card animate-scale-in">
        <div class="card-body space-y-6">
            <form method="post" class="space-y-6">
                {% csrf_token %}
                <div class="space-y-2">
                    <label for="contenido" class="text-sm font-semibold text-gray-700">Contenido</label>
                    <textarea id="contenido" name="contenido" rows="3" maxlength="400" required
                              class="w-full rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 p-3 resize-none">{{ respuesta.contenido }}</textarea>
                </div>
                <label class="inline-flex items-center gap-3 text-sm font-semibold text-gray-700">
                    <input type="checkbox" name="es_correcta" class="h-5 w-5 text-green-600 border-gray-300 rounded" {% if respuesta.es_correcta %}checked{% endif %}>
                    Marcar como correcta
                </label>

                <div class="flex flex-wrap items-center gap-3">
                    <button type="submit" class="btn-primary inline-flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                        Guardar cambios
                    </button>
                    <a href="{% url 'app_examen:detalle_examen' respuesta.pregunta.examen.id %}" class="btn-secondary inline-flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
