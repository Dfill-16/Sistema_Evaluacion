{% extends 'base.html' %}
{% load static %}

{% block title %}Editar Examen{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto animate-fade-in space-y-6">
    <div class="bg-gradient-to-r from-indigo-600 to-blue-700 text-white rounded-2xl shadow-xl p-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
            <p class="text-sm uppercase tracking-widest text-blue-100 font-semibold">Edición</p>
            <h1 class="text-3xl md:text-4xl font-bold">Actualiza la información del examen</h1>
            <p class="text-blue-100 mt-2">Optimiza textos y descripciones manteniendo la coherencia visual del sistema.</p>
        </div>
        <a href="{% url 'app_examen:detalle_examen' examen.id %}" class="btn-secondary inline-flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            Volver
        </a>
    </div>

    <div class="card animate-scale-in">
        <div class="card-body space-y-6">
            <form method="post" class="space-y-6">
                {% csrf_token %}
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label for="nombre" class="text-sm font-semibold text-gray-700">Nombre del examen</label>
                        <input id="nombre" name="nombre" type="text" required maxlength="100" value="{{ examen.nombre }}"
                               class="w-full rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 p-3">
                    </div>
                    <div class="space-y-2">
                        <label for="descripcion" class="text-sm font-semibold text-gray-700">Descripción</label>
                        <textarea id="descripcion" name="descripcion" rows="3"
                                  class="w-full rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 p-3 resize-none">{{ examen.descripcion }}</textarea>
                    </div>
                </div>

                <div class="flex flex-wrap items-center gap-3">
                    <button type="submit" class="btn-primary inline-flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                        Guardar cambios
                    </button>
                    <a href="{% url 'app_examen:detalle_examen' examen.id %}" class="btn-secondary inline-flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
